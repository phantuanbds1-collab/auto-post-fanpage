name: Auto Post Nhà Phố → Facebook Fan Page

on:
  schedule:
    - cron: "0 1 * * *"   # 08:00 ICT (UTC+7)
    - cron: "0 11 * * *"  # 18:00 ICT (UTC+7)
  workflow_dispatch:       # Chạy thử thủ công qua tab Actions

jobs:
  post-to-fanpage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post listing to Facebook Fan Page
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: python scripts/post_to_fanpage.py
